<script>
        function toggleAuth(mode) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');

            if (mode === 'signup') {
                // Style Tabs
                loginTab.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
                loginTab.classList.add('text-on-surface-variant', 'hover:bg-white/40');
                
                signupTab.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
                signupTab.classList.remove('text-on-surface-variant', 'hover:bg-white/40');

                // Switch Forms
                loginForm.classList.add('opacity-0', '-translate-x-10');
                setTimeout(() => {
                    loginForm.classList.add('hidden');
                    signupForm.classList.remove('hidden');
                    setTimeout(() => {
                        signupForm.classList.remove('opacity-0', 'translate-x-10');
                        signupForm.classList.add('opacity-100', 'translate-x-0');
                    }, 50);
                }, 300);

            } else {
                // Style Tabs
                signupTab.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
                signupTab.classList.add('text-on-surface-variant', 'hover:bg-white/40');
                
                loginTab.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
                loginTab.classList.remove('text-on-surface-variant', 'hover:bg-white/40');

                // Switch Forms
                signupForm.classList.add('opacity-0', 'translate-x-10');
                setTimeout(() => {
                    signupForm.classList.add('hidden');
                    loginForm.classList.remove('hidden');
                    setTimeout(() => {
                        loginForm.classList.remove('opacity-0', '-translate-x-10');
                        loginForm.classList.add('opacity-100', 'translate-x-0');
                    }, 50);
                }, 300);
            }
        }

        // Real Supabase auth. Falls back to the prototype's straight-through
        // redirect if SUPABASE_URL / SUPABASE_ANON_KEY aren't set yet, so the
        // click-through demo keeps working before a project is configured.
        const DASHBOARD_URL = '../dashboard_studytwin_ai/code.html';

        function setSubmitting(button, isSubmitting, label) {
            button.disabled = isSubmitting;
            button.textContent = isSubmitting ? 'Please wait…' : label;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!window.SUPABASE_IS_CONFIGURED) {
                window.location.href = DASHBOARD_URL;
                return;
            }
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            setSubmitting(submitBtn, true, 'Sign In');
            try {
                await window.authService.signIn({ email, password });
                window.location.href = DASHBOARD_URL;
            } catch (err) {
                alert(err.message || 'Sign in failed.');
            } finally {
                setSubmitting(submitBtn, false, 'Sign In');
            }
        });

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!window.SUPABASE_IS_CONFIGURED) {
                window.location.href = DASHBOARD_URL;
                return;
            }
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const fullName = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            setSubmitting(submitBtn, true, 'Create Account');
            try {
                const data = await window.authService.signUp({ email, password, fullName });
                if (data.session) {
                    window.location.href = DASHBOARD_URL;
                } else {
                    alert('Check your email to confirm your account, then sign in.');
                    toggleAuth('login');
                }
            } catch (err) {
                alert(err.message || 'Sign up failed.');
            } finally {
                setSubmitting(submitBtn, false, 'Create Account');
            }
        });

        document.getElementById('google-signin-btn').addEventListener('click', () => {
            if (!window.SUPABASE_IS_CONFIGURED) {
                alert('Supabase is not configured yet — set SUPABASE_URL and SUPABASE_ANON_KEY in .env.');
                return;
            }
            window.authService
                .signInWithOAuth('google', window.location.origin + '/dashboard_studytwin_ai/code.html')
                .catch((err) => alert(err.message || 'Google sign-in failed.'));
        });

        document.getElementById('apple-signin-btn').addEventListener('click', () => {
            if (!window.SUPABASE_IS_CONFIGURED) {
                alert('Supabase is not configured yet — set SUPABASE_URL and SUPABASE_ANON_KEY in .env.');
                return;
            }
            window.authService
                .signInWithOAuth('apple', window.location.origin + '/dashboard_studytwin_ai/code.html')
                .catch((err) => alert(err.message || 'Apple sign-in failed.'));
        });

        // Forgot Password, step 1: send the recovery email. Step 2 (setting the
        // new password) is handled below by the PASSWORD_RECOVERY auth event,
        // fired once the user clicks the link and lands back on this page.
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            if (!window.SUPABASE_IS_CONFIGURED) {
                alert('Supabase is not configured yet — set SUPABASE_URL and SUPABASE_ANON_KEY in .env.');
                return;
            }
            const prefill = document.getElementById('login-email').value;
            const email = window.prompt('Enter your account email to receive a password reset link:', prefill);
            if (!email) return;
            try {
                await window.authService.resetPasswordForEmail(email, window.location.origin + '/sign_in_to_studytwin_ai/code.html');
                alert('Check your email for a password reset link.');
            } catch (err) {
                alert(err.message || 'Could not send reset email.');
            }
        });

        if (window.SUPABASE_IS_CONFIGURED && window.authService) {
            window.authService.onAuthStateChange(async (event) => {
                if (event !== 'PASSWORD_RECOVERY') return;
                const newPassword = window.prompt('Enter a new password (min. 6 characters):');
                if (!newPassword) return;
                try {
                    await window.authService.updatePassword(newPassword);
                    alert('Password updated. Taking you to your dashboard.');
                    window.location.href = DASHBOARD_URL;
                } catch (err) {
                    alert(err.message || 'Could not update password.');
                }
            });
        }

        // Add a subtle parallax effect on the card based on mouse movement
        const card = document.getElementById('auth-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Interactive focus animations for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.style.transition = 'all 0.3s ease';
                input.parentElement.style.transform = 'translateX(4px)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.transform = 'translateX(0px)';
            });
        });
    </script>
